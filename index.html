<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzHP33lgMkazi8PW8fIhKJG_YiUBwY_ZMiHycpIdUoJvAHcnziJZuMrh5J7DMj3FBM_/exec';

const PROJECTS = {
  'NAVRATY-003': { nazev: 'Alternativní pedagogika v českých školách', resitel: 'Mgr. Šárka Klímová, Ph.D.', soucast: 'PdF', rozpocet: '3 947 270 Kč' },
  'NAVRATY-004': { nazev: 'Prevence kybernetických a psychosociálních rizik', resitel: 'Mgr. et Mgr. Petra Ambrožová, Ph.D., MBA', soucast: 'PdF', rozpocet: '5 498 444 Kč' },
  'NAVRATY-005': { nazev: 'Environmentální limity sinic v měnícím se klimatu', resitel: 'RNDr. Markéta Bohunická, Ph.D.', soucast: 'PřF', rozpocet: '5 811 872 Kč' },
  'NAVRATY-012': { nazev: 'Nosiče léčiv – el. mikroskopie a Ramanova spektroskopie', resitel: 'Mgr. Zuzana Malá, Ph.D.', soucast: 'PřF', rozpocet: '5 609 642 Kč' },
  'NAVRATY-017': { nazev: 'Udržitelné světy – odklon od neekologických způsobů života', resitel: 'Mgr. Zdenka Sokolíčková, Ph.D.', soucast: 'PdF', rozpocet: '4 368 655 Kč' },
  'NAVRATY-018': { nazev: 'Biodegradabilní poly(p-dioxanonové) filamenty s léčivy', resitel: 'Mgr. Martina Nalezinková, Ph.D.', soucast: 'PřF', rozpocet: '6 609 368 Kč' },
  'NAVRATY-019': { nazev: 'Role vodních zdrojů ve vzniku sedentismu a zemědělství', resitel: 'Mgr. Anna-Marie Marko', soucast: 'FF', rozpocet: '8 310 642 Kč' },
};

let currentUser = null;
let usersData = [];
let extData = {};
let dashboardData = [];

/* =========================
   POMOCNÉ FUNKCE
========================= */

function parseNum(v) {
  if (v === null || v === undefined || v === '') return null;
  const n = parseFloat(String(v).replace(',', '.').trim());
  return isNaN(n) ? null : n;
}

function normalizeRow(r = {}) {
  const k1 = parseNum(r.k1 ?? r.K1 ?? r['K1'] ?? '');
  const k2 = parseNum(r.k2 ?? r.K2 ?? r['K2'] ?? '');
  const k3 = parseNum(r.k3 ?? r.K3 ?? r['K3'] ?? '');
  const k4 = parseNum(r.k4 ?? r.K4 ?? r['K4'] ?? '');
  const k5 = parseNum(r.k5 ?? r.K5 ?? r['K5'] ?? '');

  let score = parseNum(r.score ?? r.Score ?? r['score '] ?? r['Score '] ?? '');
  if (score === null) {
    const vals = [k1, k2, k3, k4, k5].filter(v => v !== null);
    score = vals.length ? +(vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(2) : null;
  }

  return {
    cas: r.cas || r.Cas || r['čas'] || r['Čas'] || '',
    hodnotitel: (r.hodnotitel || r.Hodnotitel || r['hodnotitel '] || r['Hodnotitel '] || '').toString().trim(),
    projekt: (r.projekt || r.Projekt || r['projekt '] || r['Projekt '] || '').toString().trim(),
    k1,
    k2,
    k3,
    k4,
    k5,
    score,
    ext_posudky: r.ext_posudky || r.Ext_posudky || r['ext. posudky'] || r['Externí posudky'] || '',
    poradi: r.poradi || r.Poradi || r.pořadí || r['Pořadí'] || '',
    doporuceni: r.doporuceni || r.Doporuceni || r.doporučení || r['Doporučení'] || '',
    zduvodneni: r.zduvodneni || r.Zduvodneni || r.zdůvodnění || r['Zdůvodnění'] || '',
    poznamka: r.poznamka || r.Poznamka || r.poznámka || r['Poznámka'] || ''
  };
}

function normalizeExtRow(e = {}) {
  return {
    projekt: (e.projekt || e.Projekt || '').toString().trim(),
    prumer_ext: e.prumer_ext || e.Prumer_ext || e['průměr externích posudků'] || e['Průměr externích posudků'] || '',
    odkaz_posudek1: e.odkaz_posudek1 || e.Odkaz_posudek1 || '',
    odkaz_posudek2: e.odkaz_posudek2 || e.Odkaz_posudek2 || '',
    odkaz_posudek3: e.odkaz_posudek3 || e.Odkaz_posudek3 || ''
  };
}

function dedupeLatestReviews(rows) {
  const map = new Map();
  rows.forEach(r => {
    if (!r.hodnotitel || !r.projekt) return;
    const key = `${r.hodnotitel}___${r.projekt}`;
    map.set(key, r);
  });
  return [...map.values()];
}

function getRadioVal(name) {
  const el = document.querySelector(`input[name="${name}"]:checked`);
  return el ? parseInt(el.value, 10) : null;
}

function calcScore() {
  const vals = ['k1', 'k2', 'k3', 'k4', 'k5']
    .map(getRadioVal)
    .filter(v => v !== null);

  document.getElementById('live-score').textContent =
    vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(2) : '—';
}

let tt;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type === 'err' ? 'var(--accent)' : 'var(--green)';
  t.classList.add('show');
  clearTimeout(tt);
  tt = setTimeout(() => t.classList.remove('show'), 4000);
}

/* =========================
   INIT
========================= */

async function init() {
  try {
    const res = await fetch(SHEET_URL + '?t=' + Date.now());
    const json = await res.json();

    usersData = json.uzivatele || [];
    const sel = document.getElementById('select-user');
    sel.innerHTML = '<option value="">— Vyberte —</option>';

    usersData.forEach(u => {
      const opt = document.createElement('option');
      opt.value = u.jmeno;
      opt.textContent = u.jmeno + (u.role === 'správce' ? ' (správce)' : '');
      sel.appendChild(opt);
    });

    extData = {};
    (json.ext || []).forEach(e => {
      const row = normalizeExtRow(e);
      if (row.projekt) extData[row.projekt] = row;
    });

    document.getElementById('login-loading').style.display = 'none';
    document.getElementById('login-form').style.display = 'block';
  } catch (e) {
    console.error('INIT ERROR:', e);
    document.getElementById('login-loading').textContent = 'Chyba načítání. Obnovte stránku.';
  }
}
init();

/* =========================
   LOGIN
========================= */

function doLogin() {
  const jmeno = document.getElementById('select-user').value;
  const pin = document.getElementById('input-pin').value.trim();
  const err = document.getElementById('login-error');

  if (!jmeno) {
    err.textContent = 'Vyberte prosím své jméno.';
    return;
  }

  const user = usersData.find(u => u.jmeno === jmeno);

  if (!user || pin !== user.pin) {
    err.textContent = 'Nesprávný přístupový kód.';
    return;
  }

  currentUser = user;
  document.getElementById('header-username').textContent = user.jmeno;
  document.getElementById('header-role').textContent = user.role;

  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-app').classList.add('active');

  if (user.role === 'správce') {
    document.getElementById('admin-banner').style.display = 'flex';
  }

  err.textContent = '';
}

document.getElementById('input-pin').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function doLogout() {
  currentUser = null;
  document.getElementById('screen-app').classList.remove('active');
  document.getElementById('screen-login').classList.add('active');
  document.getElementById('input-pin').value = '';
  document.getElementById('select-user').value = '';
  document.getElementById('admin-banner').style.display = 'none';
}

/* =========================
   TABS
========================= */

function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('nav-' + tab).classList.add('active');

  if (tab === 'dashboard') {
    loadDashboard();
  }
}

/* =========================
   FORMULÁŘ
========================= */

function onProjectChange() {
  const id = document.getElementById('sel-projekt').value;
  const info = document.getElementById('project-info');
  const extBox = document.getElementById('ext-box');

  if (!id) {
    info.classList.remove('visible');
    extBox.classList.remove('visible');
    return;
  }

  const p = PROJECTS[id];
  document.getElementById('pinfo-id').textContent = id;
  document.getElementById('pinfo-resitel').textContent = p.resitel;
  document.getElementById('pinfo-soucast').textContent = p.soucast;
  document.getElementById('pinfo-rozpocet').textContent = p.rozpocet;
  info.classList.add('visible');

  const ext = extData[id];
  if (ext && ext.prumer_ext) {
    const extVal = parseNum(ext.prumer_ext);
    document.getElementById('ext-score-val').textContent = extVal === null ? ext.prumer_ext : extVal.toFixed(2);

    const linksEl = document.getElementById('ext-links');
    linksEl.innerHTML = '';

    ['odkaz_posudek1', 'odkaz_posudek2', 'odkaz_posudek3'].forEach((k, i) => {
      if (ext[k] && String(ext[k]).startsWith('http')) {
        const a = document.createElement('a');
        a.href = ext[k];
        a.target = '_blank';
        a.className = 'ext-link';
        a.innerHTML = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M5 2H2a1 1 0 00-1 1v7a1 1 0 001 1h7a1 1 0 001-1V7M8 1h3m0 0v3m0-3L5 7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg> Posudek ${i + 1}`;
        linksEl.appendChild(a);
      }
    });

    extBox.classList.add('visible');
  } else {
    extBox.classList.remove('visible');
  }
}

function resetForm() {
  document.getElementById('sel-projekt').value = '';
  document.getElementById('project-info').classList.remove('visible');
  document.getElementById('ext-box').classList.remove('visible');

  ['k1', 'k2', 'k3', 'k4', 'k5'].forEach(k => {
    document.querySelectorAll(`input[name="${k}"]`).forEach(r => r.checked = false);
  });

  document.getElementById('live-score').textContent = '—';

  ['poradi', 'doporuceni', 'zduvodneni', 'poznamka'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

async function submitForm() {
  const projekt = document.getElementById('sel-projekt').value;
  if (!projekt) {
    showToast('Vyberte prosím projekt.', 'err');
    return;
  }

  const k1 = getRadioVal('k1');
  const k2 = getRadioVal('k2');
  const k3 = getRadioVal('k3');
  const k4 = getRadioVal('k4');
  const k5 = getRadioVal('k5');

  if (!k1 || !k2 || !k3 || !k4 || !k5) {
    showToast('Vyplňte všechna kritéria K1–K5.', 'err');
    return;
  }

  const doporuceni = document.getElementById('doporuceni').value;
  if (!doporuceni) {
    showToast('Vyberte doporučení.', 'err');
    return;
  }

  const ext = extData[projekt];
  const score = +(((k1 + k2 + k3 + k4 + k5) / 5).toFixed(2));

  const zaznam = {
    cas: new Date().toLocaleString('cs-CZ'),
    hodnotitel: currentUser.jmeno,
    role: currentUser.role || '',
    projekt: projekt,
    k1: k1,
    k2: k2,
    k3: k3,
    k4: k4,
    k5: k5,
    score: score,
    ext_posudky: ext && ext.prumer_ext ? ext.prumer_ext : '',
    poradi: document.getElementById('poradi').value || '',
    doporuceni: doporuceni,
    zduvodneni: document.getElementById('zduvodneni').value,
    poznamka: document.getElementById('poznamka').value
  };

  document.getElementById('sending-overlay').classList.add('show');
  document.getElementById('submit-btn').disabled = true;

  try {
    await fetch(SHEET_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(zaznam)
    });

    document.getElementById('sending-overlay').classList.remove('show');
    document.getElementById('submit-btn').disabled = false;

    showToast(`Hodnocení projektu ${projekt} uloženo / přepsáno.`);
    resetForm();
    await loadDashboard();
  } catch (e) {
    console.error('SUBMIT ERROR:', e);
    document.getElementById('sending-overlay').classList.remove('show');
    document.getElementById('submit-btn').disabled = false;
    showToast('Chyba při ukládání. Zkuste znovu.', 'err');
  }
}

/* =========================
   DASHBOARD
========================= */

async function loadDashboard() {
  document.getElementById('projects-list').innerHTML =
    '<div class="dash-loading"><div class="dash-loading-spinner"></div><p>Načítám ze sdílené databáze…</p></div>';

  try {
    const res = await fetch(SHEET_URL + '?t=' + Date.now());
    const json = await res.json();

    const rawRows = (json.hodnoceni || [])
      .map(normalizeRow)
      .filter(r => r.hodnotitel && r.projekt);

    dashboardData = dedupeLatestReviews(rawRows);

    extData = {};
    (json.ext || []).forEach(e => {
      const row = normalizeExtRow(e);
      if (row.projekt) extData[row.projekt] = row;
    });

    renderDashboard(dashboardData, json.uzivatele || []);
  } catch (e) {
    console.error('LOAD DASHBOARD ERROR:', e);
    document.getElementById('projects-list').innerHTML =
      '<div class="empty-state"><h3>Nepodařilo se načíst data</h3><p style="color:var(--ink-60)">Klikněte Obnovit.</p></div>';
  }
}

function renderDashboard(hodnoceni, uzivatele) {
  const total = hodnoceni.length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-projects').textContent = [...new Set(hodnoceni.map(h => h.projekt))].length;

  const scores = hodnoceni
    .map(h => h.score)
    .filter(s => s !== null);

  document.getElementById('stat-avg').textContent =
    scores.length ? (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(2) : '—';

  document.getElementById('stat-fin').textContent = Object.keys(PROJECTS).filter(pid => {
    const rev = hodnoceni.filter(h => h.projekt === pid);
    return rev.filter(h => h.doporuceni === 'Financovat').length > rev.length / 2 && rev.length > 0;
  }).length;

  const members = [...new Set(hodnoceni.map(h => h.hodnotitel))];
  document.getElementById('dash-meta').textContent =
    `${total} hodnocení od ${members.length} členů · ${new Date().toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' })}`;

  if (currentUser && currentUser.role === 'správce') {
    document.getElementById('progress-section').style.display = 'block';

    // správce je také hodnotitel, tedy nikoho nevyřazujeme
    const hodnotitele = (uzivatele.length ? uzivatele : usersData);

    document.getElementById('progress-grid').innerHTML = hodnotitele.map(u => {
      const count = [...new Set(hodnoceni.filter(h => h.hodnotitel === u.jmeno).map(h => h.projekt))].length;
      const pct = Math.round(count / 7 * 100);

      return `
        <div class="progress-card">
          <div class="progress-name">${u.jmeno}</div>
          <div class="progress-bar-wrap">
            <div class="progress-bar" style="width:${pct}%"></div>
          </div>
          <div class="progress-count">${count}/7 projektů</div>
        </div>
      `;
    }).join('');
  } else {
    document.getElementById('progress-section').style.display = 'none';
  }

  const sorted = Object.keys(PROJECTS).map(pid => {
    const reviews = hodnoceni.filter(h => h.projekt === pid);
    const sc = reviews.map(r => r.score).filter(s => s !== null);
    const avg = sc.length ? sc.reduce((a, b) => a + b, 0) / sc.length : 0;

    const rc = {};
    reviews.forEach(r => {
      if (r.doporuceni) rc[r.doporuceni] = (rc[r.doporuceni] || 0) + 1;
    });

    const top = Object.entries(rc).sort((a, b) => b[1] - a[1])[0];
    const ext = extData[pid];
    const extAvgRaw = ext && ext.prumer_ext ? parseNum(ext.prumer_ext) : null;

    return {
      pid,
      reviews,
      avg,
      rec: top ? top[0] : null,
      extAvg: extAvgRaw
    };
  }).sort((a, b) => b.avg - a.avg);

  const container = document.getElementById('projects-list');

  if (!total) {
    container.innerHTML = '<div class="empty-state"><h3>Zatím žádná hodnocení</h3><p style="color:var(--ink-60)">Jakmile členové začnou hodnotit, výsledky se zobrazí zde.</p></div>';
    return;
  }

  container.innerHTML = '<div class="projects-grid">' + sorted.map(({ pid, reviews, avg, rec, extAvg }, i) => {
    const rank = i + 1;
    const proj = PROJECTS[pid];

    const rc =
      rec === 'Financovat' ? 'rec-fin' :
      rec === 'Nefinancovat' ? 'rec-nefin' :
      rec === 'Podmíněně financovat' ? 'rec-pod' :
      'rec-ceka';

    const rt = rec || (reviews.length ? 'Různá' : 'Čeká');

    const extBadge = extAvg !== null
      ? `<div class="ext-badge"><div class="ext-badge-val">${extAvg.toFixed(2)}</div><span class="ext-badge-label">ext. posudek</span></div>`
      : '';

    const rh = reviews.map(r => `
      <div class="review-item">
        <div class="review-header">
          <span class="review-author">${r.hodnotitel}</span>
          <div class="review-scores">
            <span class="review-score-pill">Skóre <span>${r.score !== null ? r.score.toFixed(2) : '—'}</span></span>
            <span class="review-score-pill">K1 <span>${r.k1 ?? '—'}</span></span>
            <span class="review-score-pill">K2 <span>${r.k2 ?? '—'}</span></span>
            <span class="review-score-pill">K3 <span>${r.k3 ?? '—'}</span></span>
            <span class="review-score-pill">K4 <span>${r.k4 ?? '—'}</span></span>
            <span class="review-score-pill">K5 <span>${r.k5 ?? '—'}</span></span>
            ${r.poradi ? `<span class="review-score-pill">Pořadí <span>${r.poradi}</span></span>` : ''}
          </div>
        </div>
        ${r.doporuceni ? `<div class="review-comment" style="font-style:normal;margin-bottom:6px;"><strong>Doporučení:</strong> ${r.doporuceni}</div>` : ''}
        ${r.zduvodneni ? `<div class="review-comment">"${r.zduvodneni}"</div>` : ''}
      </div>
    `).join('');

    return `
      <div class="project-card" id="pc-${pid}">
        <div class="project-card-header" onclick="toggleCard('${pid}')">
          <div class="project-card-left">
            <div class="project-rank rank-${rank}">${rank}</div>
            <div>
              <div class="project-card-name">${proj.nazev}</div>
              <div class="project-card-id">${pid} · ${proj.resitel} · ${proj.soucast}</div>
            </div>
          </div>
          <div class="project-card-right">
            ${extBadge}
            <div class="score-badge">
              <div class="score-badge-val">${reviews.length ? avg.toFixed(2) : '—'}</div>
              <span class="score-badge-label">průměr komise</span>
            </div>
            <div class="votes-count">
              <strong>${reviews.length}</strong>hodnocení
            </div>
            <span class="rec-pill ${rc}">${rt}</span>
            <div class="expand-icon">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M2 4l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </div>
          </div>
        </div>
        <div class="project-card-detail">
          <div class="detail-title">Poslední platná hodnocení členů (${reviews.length})</div>
          <div class="reviews-list">
            ${rh || '<p style="color:var(--ink-60);font-size:13px;">Zatím žádné.</p>'}
          </div>
        </div>
      </div>
    `;
  }).join('') + '</div>';
}

function toggleCard(pid) {
  document.getElementById('pc-' + pid).classList.toggle('expanded');
}

function exportCSV() {
  if (!dashboardData.length) {
    showToast('Nejprve načtěte data.', 'err');
    return;
  }

  const h = ['cas', 'hodnotitel', 'projekt', 'k1', 'k2', 'k3', 'k4', 'k5', 'score', 'ext_posudky', 'poradi', 'doporuceni', 'zduvodneni', 'poznamka'];
  const rows = dashboardData.map(r =>
    h.map(k => {
      let v = r[k];
      if (typeof v === 'number') v = String(v).replace('.', ',');
      return `"${(v || '').toString().replace(/"/g, '""')}"`;
    }).join(';')
  );

  const a = document.createElement('a');
  a.href = URL.createObjectURL(
    new Blob(['\uFEFF' + [h.join(';'), ...rows].join('\n')], { type: 'text/csv;charset=utf-8;' })
  );
  a.download = `navraty_hodnoceni_${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
}
</script>
